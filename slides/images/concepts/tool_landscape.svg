<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2c3e50">AI Tool Landscape</text>

  <!-- Column 1: Conversational AI -->
  <rect x="50" y="80" width="250" height="380" rx="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2980b9">Conversational AI</text>

  <!-- ChatGPT -->
  <rect x="70" y="140" width="210" height="90" rx="8" fill="#10a37f" opacity="0.9"/>
  <text x="175" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">ChatGPT</text>
  <text x="175" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Quick questions</text>
  <text x="175" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Writing tasks</text>

  <!-- Claude -->
  <rect x="70" y="245" width="210" height="90" rx="8" fill="#d4a574" opacity="0.9"/>
  <text x="175" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Claude</text>
  <text x="175" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Long documents</text>
  <text x="175" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Analysis tasks</text>

  <!-- Interface label -->
  <rect x="90" y="355" width="170" height="35" rx="5" fill="#3498db"/>
  <text x="175" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Browser-based</text>

  <!-- Column 2: AI Code Editors -->
  <rect x="325" y="80" width="250" height="380" rx="10" fill="#f0f8e8" stroke="#2ecc71" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">AI Code Editors</text>

  <!-- Cursor -->
  <rect x="345" y="140" width="210" height="90" rx="8" fill="#5c6bc0" opacity="0.9"/>
  <text x="450" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Cursor</text>
  <text x="450" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Code understanding</text>
  <text x="450" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Project context</text>

  <!-- VS Code + Copilot -->
  <rect x="345" y="245" width="210" height="90" rx="8" fill="#007acc" opacity="0.9"/>
  <text x="450" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">VS Code + Copilot</text>
  <text x="450" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Code completion</text>
  <text x="450" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• IDE integration</text>

  <!-- Interface label -->
  <rect x="365" y="355" width="170" height="35" rx="5" fill="#2ecc71"/>
  <text x="450" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">GUI Application</text>

  <!-- Column 3: CLI Assistants -->
  <rect x="600" y="80" width="250" height="380" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>
  <text x="725" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#d35400">CLI Assistants</text>

  <!-- Kilo -->
  <rect x="620" y="140" width="210" height="90" rx="8" fill="#8e44ad" opacity="0.9"/>
  <text x="725" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Kilo</text>
  <text x="725" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Terminal workflow</text>
  <text x="725" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Git operations</text>

  <!-- Aider -->
  <rect x="620" y="245" width="210" height="90" rx="8" fill="#16a085" opacity="0.9"/>
  <text x="725" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Aider</text>
  <text x="725" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Multi-file editing</text>
  <text x="725" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• Git integration</text>

  <!-- Interface label -->
  <rect x="640" y="355" width="170" height="35" rx="5" fill="#e67e22"/>
  <text x="725" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Command Line</text>
</svg>