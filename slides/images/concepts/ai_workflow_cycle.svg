<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2c3e50">The Core Pattern: Ask → Review → Apply → Verify</text>

  <!-- Central Circle -->
  <circle cx="400" cy="260" r="160" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- ASK - Top -->
  <circle cx="400" cy="110" r="50" fill="#3498db"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ASK</text>
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Describe what you want</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Prompt quality matters</text>

  <!-- Arrow: ASK → REVIEW -->
  <path d="M 440 130 Q 520 150 550 210" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- REVIEW - Right -->
  <circle cx="560" cy="260" r="50" fill="#e67e22"/>
  <text x="560" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">REVIEW</text>
  <text x="650" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Check AI's suggestion</text>
  <text x="650" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">AI can make mistakes</text>

  <!-- Arrow: REVIEW → APPLY -->
  <path d="M 550 310 Q 520 370 440 390" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- APPLY - Bottom -->
  <circle cx="400" cy="410" r="50" fill="#27ae60"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">APPLY</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Use the suggestion</text>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">You decide, not AI</text>

  <!-- Arrow: APPLY → VERIFY -->
  <path d="M 360 390 Q 280 370 250 310" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- VERIFY - Left -->
  <circle cx="240" cy="260" r="50" fill="#9b59b6"/>
  <text x="240" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">VERIFY</text>
  <text x="150" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Test that it works</text>
  <text x="150" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Testing confirms success</text>

  <!-- Arrow: VERIFY → ASK -->
  <path d="M 250 210 Q 280 150 360 130" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Center Iteration Note -->
  <rect x="320" y="235" width="160" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Iterate</text>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Rarely perfect first time</text>

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>