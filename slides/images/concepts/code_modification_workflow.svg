<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="400" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2c3e50">Code Modification Workflow</text>

  <!-- Step 1: Understand -->
  <rect x="50" y="100" width="150" height="200" rx="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
  <circle cx="125" cy="140" r="25" fill="#3498db"/>
  <text x="125" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1</text>
  <text x="125" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">UNDERSTAND</text>
  <text x="125" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Read the code</text>
  <text x="125" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">first (Part 03)</text>

  <!-- Arrow 1 -->
  <path d="M 210 200 L 240 200" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Specify -->
  <rect x="250" y="100" width="150" height="200" rx="10" fill="#f0f8e8" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="325" cy="140" r="25" fill="#2ecc71"/>
  <text x="325" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2</text>
  <text x="325" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">SPECIFY</text>
  <text x="325" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Describe exactly</text>
  <text x="325" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">what change</text>

  <!-- Arrow 2 -->
  <path d="M 410 200 L 440 200" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Review -->
  <rect x="450" y="100" width="150" height="200" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>
  <circle cx="525" cy="140" r="25" fill="#e67e22"/>
  <text x="525" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">3</text>
  <text x="525" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d35400">REVIEW</text>
  <text x="525" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Check AI's</text>
  <text x="525" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">suggestion</text>

  <!-- Arrow 3 -->
  <path d="M 610 200 L 640 200" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Apply -->
  <rect x="650" y="100" width="100" height="90" rx="10" fill="#fde9e8" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="700" cy="130" r="20" fill="#e74c3c"/>
  <text x="700" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">4</text>
  <text x="700" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">APPLY</text>

  <!-- Arrow 4 (down) -->
  <path d="M 700 200 L 700 230" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Verify -->
  <rect x="650" y="240" width="100" height="90" rx="10" fill="#f5eef8" stroke="#9b59b6" stroke-width="2"/>
  <circle cx="700" cy="270" r="20" fill="#9b59b6"/>
  <text x="700" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">5</text>
  <text x="700" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">VERIFY</text>

  <!-- Back Arrow (Verify -> Understand) -->
  <path d="M 650 285 Q 400 350 125 285" stroke="#95a5a6" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead2)"/>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Iterate if needed</text>

  <!-- Inline Edit Badge -->
  <rect x="620" y="330" width="160" height="50" rx="8" fill="#34495e"/>
  <text x="700" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ecf0f1">Use Cmd+K for</text>
  <text x="700" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ecf0f1">inline editing</text>

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>