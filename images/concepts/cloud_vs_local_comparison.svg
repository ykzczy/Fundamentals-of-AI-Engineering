<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Cloud vs Local Inference Architecture</text>
  
  <!-- CLOUD SIDE (Left) -->
  <rect x="20" y="50" width="420" height="420" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <text x="230" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565C0">☁️ Cloud API Inference</text>
  
  <!-- Your App -->
  <rect x="40" y="110" width="100" height="60" rx="8" fill="#3498db"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Your App</text>
  
  <!-- Arrow to Internet -->
  <line x1="140" y1="140" x2="200" y2="140" stroke="#3498db" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Request</text>
  
  <!-- Internet Cloud -->
  <ellipse cx="260" cy="140" rx="50" ry="30" fill="#90CAF9" stroke="#42A5F5" stroke-width="2"/>
  <text x="260" y="145" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">Internet</text>
  
  <!-- Arrow to API -->
  <line x1="310" y1="140" x2="360" y2="140" stroke="#3498db" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- API Provider -->
  <rect x="370" y="100" width="100" height="80" rx="8" fill="#FF9800"/>
  <text x="420" y="130" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Cloud API</text>
  <text x="420" y="145" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">(OpenAI/Anthropic)</text>
  <text x="420" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">GPT-4, Claude</text>
  
  <!-- Arrow down to GPU -->
  <line x1="420" y1="180" x2="420" y2="230" stroke="#3498db" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- GPU Cluster -->
  <rect x="360" y="240" width="120" height="70" rx="8" fill="#F44336"/>
  <text x="420" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">GPU Cluster</text>
  <text x="420" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">A100/H100 GPUs</text>
  
  <!-- Response Arrow (dashed) -->
  <path d="M 420 310 Q 420 340 260 340 Q 100 340 90 200" stroke="#4CAF50" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow-green)"/>
  <text x="260" y="360" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50">Response</text>
  
  <!-- Cloud Pros/Cons -->
  <rect x="40" y="380" width="180" height="80" rx="5" fill="#c8e6c9"/>
  <text x="130" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2e7d32">✓ Pros:</text>
  <text x="50" y="418" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• Best models available</text>
  <text x="50" y="432" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• No hardware needed</text>
  <text x="50" y="446" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• Easy to get started</text>
  
  <rect x="230" y="380" width="180" height="80" rx="5" fill="#ffcdd2"/>
  <text x="320" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#c62828">✗ Cons:</text>
  <text x="240" y="418" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Pay per request</text>
  <text x="240" y="432" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Data leaves machine</text>
  <text x="240" y="446" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Requires internet</text>
  
  <!-- LOCAL SIDE (Right) -->
  <rect x="460" y="50" width="420" height="420" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="670" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">🖥️ Local Inference (Ollama)</text>
  
  <!-- Your App -->
  <rect x="480" y="110" width="100" height="60" rx="8" fill="#3498db"/>
  <text x="530" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Your App</text>
  
  <!-- Arrow to Localhost -->
  <line x1="580" y1="140" x2="640" y2="140" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="610" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">HTTP</text>
  
  <!-- Localhost -->
  <rect x="650" y="110" width="100" height="60" rx="8" fill="#9C27B0"/>
  <text x="700" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">localhost</text>
  <text x="700" y="155" font-family="monospace" font-size="10" text-anchor="middle" fill="white">:11434</text>
  
  <!-- Arrow to Ollama -->
  <line x1="700" y1="170" x2="700" y2="210" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Ollama Server -->
  <rect x="640" y="220" width="120" height="60" rx="8" fill="#673AB7"/>
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Ollama</text>
  <text x="700" y="268" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Model Server</text>
  
  <!-- Arrow to Model -->
  <line x1="700" y1="280" x2="700" y2="310" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Local Model -->
  <rect x="640" y="320" width="120" height="60" rx="8" fill="#E91E63"/>
  <text x="700" y="350" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Local LLM</text>
  <text x="700" y="368" font-family="monospace" font-size="9" text-anchor="middle" fill="white">llama3.2:1b</text>
  
  <!-- Your Hardware Box -->
  <rect x="500" y="270" width="120" height="110" rx="5" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1"/>
  <text x="560" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#F57F17">Your Hardware</text>
  <text x="510" y="310" font-family="Arial, sans-serif" font-size="9" fill="#F57F17">• CPU/GPU</text>
  <text x="510" y="328" font-family="Arial, sans-serif" font-size="9" fill="#F57F17">• RAM/VRAM</text>
  <text x="510" y="346" font-family="Arial, sans-serif" font-size="9" fill="#F57F17">• SSD Storage</text>
  <text x="510" y="364" font-family="Arial, sans-serif" font-size="9" fill="#F57F17">• No cloud costs</text>
  
  <!-- Response Arrow -->
  <path d="M 700 380 Q 700 420 530 420 Q 530 350 530 170" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow-green)"/>
  <text x="620" y="440" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">Response (Local)</text>
  
  <!-- Local Pros/Cons -->
  <rect x="480" y="380" width="180" height="80" rx="5" fill="#c8e6c9"/>
  <text x="570" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2e7d32">✓ Pros:</text>
  <text x="490" y="418" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• Data stays local</text>
  <text x="490" y="432" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• No per-token cost</text>
  <text x="490" y="446" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">• Works offline</text>
  
  <rect x="670" y="380" width="180" height="80" rx="5" fill="#ffcdd2"/>
  <text x="760" y="400" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#c62828">✗ Cons:</text>
  <text x="680" y="418" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Need hardware</text>
  <text x="680" y="432" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Smaller models</text>
  <text x="680" y="446" font-family="Arial, sans-serif" font-size="9" fill="#b71c1c">• Setup required</text>
</svg>