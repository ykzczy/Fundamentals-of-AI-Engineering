<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Error Handling Flowchart for Local Inference</text>
  
  <!-- Start -->
  <ellipse cx="400" cy="70" rx="60" ry="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Error Occurred</text>
  
  <!-- Decision 1: ConnectionError -->
  <polygon points="400,110 500,160 400,210 300,160" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Connection</text>
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Error?</text>
  
  <!-- Yes - ConnectionError path -->
  <line x1="300" y1="160" x2="200" y2="160" stroke="#27ae60" stroke-width="2"/>
  <text x="250" y="150" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Decision: Ollama running? -->
  <polygon points="200,200 260,240 200,280 140,240" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#155724">Ollama</text>
  <text x="200" y="248" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#155724">running?</text>
  
  <!-- No - Not running -->
  <line x1="140" y1="240" x2="80" y2="240" stroke="#dc3545" stroke-width="2"/>
  <text x="110" y="230" font-family="Arial, sans-serif" font-size="9" fill="#dc3545">No</text>
  
  <!-- Solution: Run serve -->
  <rect x="20" y="260" width="120" height="60" rx="8" fill="#28a745"/>
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Run:</text>
  <text x="80" y="305" font-family="monospace" font-size="9" text-anchor="middle" fill="white">ollama serve</text>
  
  <!-- Yes - Is running -->
  <line x1="200" y1="280" x2="200" y2="340" stroke="#27ae60" stroke-width="2"/>
  <text x="215" y="310" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Yes</text>
  
  <!-- Check port -->
  <rect x="140" y="350" width="120" height="50" rx="8" fill="#17a2b8"/>
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">Check if port</text>
  <text x="200" y="385" font-family="monospace" font-size="9" text-anchor="middle" fill="white">11434 is free</text>
  
  <!-- Decision 2: 404 Not Found -->
  <line x1="500" y1="160" x2="550" y2="160" stroke="#27ae60" stroke-width="2"/>
  <text x="525" y="150" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">No</text>
  
  <polygon points="620,110 700,160 620,210 540,160" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="620" y="155" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">404</text>
  <text x="620" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Error?</text>
  
  <!-- Yes - 404 path -->
  <line x1="700" y1="160" x2="750" y2="160" stroke="#27ae60" stroke-width="2"/>
  <text x="725" y="150" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Solution: Pull model -->
  <rect x="700" y="180" width="90" height="50" rx="8" fill="#28a745"/>
  <text x="745" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">Pull model:</text>
  <text x="745" y="215" font-family="monospace" font-size="8" text-anchor="middle" fill="white">ollama pull</text>
  
  <!-- Decision 3: Timeout -->
  <line x1="620" y1="210" x2="620" y2="270" stroke="#27ae60" stroke-width="2"/>
  <text x="635" y="240" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">No</text>
  
  <polygon points="620,270 700,320 620,370 540,320" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="620" y="315" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Timeout</text>
  <text x="620" y="330" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Error?</text>
  
  <!-- Yes - Timeout path -->
  <line x1="700" y1="320" x2="750" y2="320" stroke="#27ae60" stroke-width="2"/>
  <text x="725" y="310" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Decision: Model size -->
  <polygon points="770,360 750,400 730,360 750,320" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="750" y="365" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#155724">Model</text>
  <text x="750" y="378" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#155724">large?</text>
  
  <!-- Solutions for timeout -->
  <line x1="750" y1="400" x2="750" y2="440" stroke="#27ae60" stroke-width="2"/>
  <text x="765" y="420" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Yes</text>
  <rect x="700" y="450" width="100" height="60" rx="8" fill="#28a745"/>
  <text x="750" y="470" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Use smaller</text>
  <text x="750" y="485" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">model or</text>
  <text x="750" y="500" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">increase timeout</text>
  
  <!-- Decision 4: OOM -->
  <line x1="620" y1="370" x2="620" y2="420" stroke="#27ae60" stroke-width="2"/>
  <text x="635" y="395" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">No</text>
  
  <polygon points="620,420 700,470 620,520 540,470" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="620" y="465" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">OOM</text>
  <text x="620" y="480" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#856404">Crash?</text>
  
  <!-- Yes - OOM -->
  <line x1="700" y1="470" x2="750" y2="470" stroke="#27ae60" stroke-width="2"/>
  <text x="725" y="460" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Solution for OOM -->
  <rect x="350" y="520" width="250" height="60" rx="8" fill="#28a745"/>
  <text x="475" y="540" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">✓ Solution: Use smaller model or quantization</text>
  <text x="475" y="560" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">(e.g., llama3.2:1b instead of llama3.1:8b)</text>
  
  <!-- First request slow note -->
  <rect x="30" y="430" width="200" height="70" rx="8" fill="#cce5ff" stroke="#004085" stroke-width="2"/>
  <text x="130" y="455" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#004085">💡 Note:</text>
  <text x="130" y="475" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#004085">First request is always slow</text>
  <text x="130" y="490" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#004085">(model loading time)</text>
</svg>