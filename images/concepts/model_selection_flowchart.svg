<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <!-- Background -->
  <rect width="900" height="650" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Model Selection Decision Flowchart</text>
  
  <!-- START -->
  <ellipse cx="450" cy="70" rx="60" ry="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="450" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">START</text>
  
  <!-- Decision 1: Privacy/Offline Required? -->
  <polygon points="450,110 570,170 450,230 330,170" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="450" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#856404">Privacy/Offline</text>
  <text x="450" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#856404">Required?</text>
  
  <!-- YES - Privacy Required -->
  <line x1="330" y1="170" x2="250" y2="170" stroke="#27ae60" stroke-width="2"/>
  <text x="290" y="160" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">Yes</text>
  
  <!-- LOCAL PATH -->
  <rect x="100" y="140" width="140" height="60" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="170" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">LOCAL</text>
  <text x="170" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">INFERENCE</text>
  
  <!-- Decision 2: Latency Critical? (under Local) -->
  <polygon points="170,220 260,280 170,340 80,280" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="170" y="275" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#155724">Latency</text>
  <text x="170" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#155724">Critical?</text>
  
  <!-- YES - Latency Critical -->
  <line x1="80" y1="280" x2="30" y2="280" stroke="#27ae60" stroke-width="2"/>
  <text x="55" y="270" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Small Model Recommendation -->
  <rect x="10" y="310" width="120" height="80" rx="8" fill="#17a2b8"/>
  <text x="70" y="330" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Small Model</text>
  <text x="70" y="348" font-family="monospace" font-size="9" text-anchor="middle" fill="white">1B-3B params</text>
  <text x="70" y="365" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">llama3.2:1b</text>
  <text x="70" y="380" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~0.5-1s</text>
  
  <!-- NO - Not latency critical -->
  <line x1="170" y1="340" x2="170" y2="400" stroke="#dc3545" stroke-width="2"/>
  <text x="185" y="370" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">No</text>
  
  <!-- Decision 3: Quality Critical? -->
  <polygon points="170,400 260,460 170,520 80,460" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="170" y="455" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#155724">Quality</text>
  <text x="170" y="470" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#155724">Critical?</text>
  
  <!-- YES - Quality Critical -->
  <line x1="80" y1="460" x2="30" y2="460" stroke="#27ae60" stroke-width="2"/>
  <text x="55" y="450" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Large Local Model -->
  <rect x="10" y="490" width="120" height="80" rx="8" fill="#6f42c1"/>
  <text x="70" y="510" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Large Model</text>
  <text x="70" y="528" font-family="monospace" font-size="9" text-anchor="middle" fill="white">7B-13B params</text>
  <text x="70" y="545" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">llama3.1:8b</text>
  <text x="70" y="560" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Better quality</text>
  
  <!-- NO - Balanced -->
  <line x1="170" y1="520" x2="170" y2="580" stroke="#dc3545" stroke-width="2"/>
  <text x="185" y="550" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">No</text>
  
  <!-- Medium Model -->
  <rect x="110" y="580" width="120" height="60" rx="8" fill="#fd7e14"/>
  <text x="170" y="600" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Balanced</text>
  <text x="170" y="618" font-family="monospace" font-size="9" text-anchor="middle" fill="white">3B-7B params</text>
  <text x="170" y="633" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">mistral:7b</text>
  
  <!-- NO - Privacy not required (Cloud path) -->
  <line x1="570" y1="170" x2="650" y2="170" stroke="#dc3545" stroke-width="2"/>
  <text x="610" y="160" font-family="Arial, sans-serif" font-size="11" fill="#dc3545">No</text>
  
  <!-- CLOUD PATH -->
  <rect x="660" y="140" width="140" height="60" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="730" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CLOUD</text>
  <text x="730" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">API</text>
  
  <!-- Decision 4: Rapid Prototyping? -->
  <polygon points="730,220 820,280 730,340 640,280" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
  <text x="730" y="275" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#721c24">Rapid</text>
  <text x="730" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#721c24">Prototyping?</text>
  
  <!-- YES - Prototyping -->
  <line x1="820" y1="280" x2="870" y2="280" stroke="#27ae60" stroke-width="2"/>
  <text x="845" y="270" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Best APIs -->
  <rect x="800" y="310" width="90" height="80" rx="8" fill="#10a37f"/>
  <text x="845" y="330" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Best APIs</text>
  <text x="845" y="350" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">GPT-4</text>
  <text x="845" y="365" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Claude</text>
  <text x="845" y="380" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Best quality</text>
  
  <!-- NO - Production -->
  <line x1="730" y1="340" x2="730" y2="400" stroke="#dc3545" stroke-width="2"/>
  <text x="745" y="370" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">No</text>
  
  <!-- Decision 5: Cost Sensitive? -->
  <polygon points="730,400 820,460 730,520 640,460" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
  <text x="730" y="455" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#721c24">Cost</text>
  <text x="730" y="470" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#721c24">Sensitive?</text>
  
  <!-- YES - Cost sensitive -->
  <line x1="640" y1="460" x2="590" y2="460" stroke="#27ae60" stroke-width="2"/>
  <text x="615" y="450" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Yes</text>
  
  <!-- Smaller APIs -->
  <rect x="530" y="490" width="120" height="70" rx="8" fill="#fd7e14"/>
  <text x="590" y="510" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Budget APIs</text>
  <text x="590" y="530" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">GPT-4o-mini</text>
  <text x="590" y="545" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Claude Haiku</text>
  
  <!-- NO - Not cost sensitive -->
  <line x1="730" y1="520" x2="730" y2="580" stroke="#dc3545" stroke-width="2"/>
  <text x="745" y="550" font-family="Arial, sans-serif" font-size="10" fill="#dc3545">No</text>
  
  <!-- Enterprise APIs -->
  <rect x="670" y="580" width="120" height="60" rx="8" fill="#6f42c1"/>
  <text x="730" y="600" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Enterprise</text>
  <text x="730" y="618" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Claude Opus</text>
  <text x="730" y="633" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">GPT-4 Turbo</text>
  
  <!-- Legend -->
  <rect x="300" y="250" width="300" height="120" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Quick Reference</text>
  <text x="320" y="295" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">● Privacy/Offline → Local (Ollama)</text>
  <text x="320" y="315" font-family="Arial, sans-serif" font-size="10" fill="#3498db">● Latency critical → Small model (1B-3B)</text>
  <text x="320" y="335" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">● Quality critical → Large model (7B+)</text>
  <text x="320" y="355" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">● Rapid dev → Cloud API (GPT-4/Claude)</text>
</svg>