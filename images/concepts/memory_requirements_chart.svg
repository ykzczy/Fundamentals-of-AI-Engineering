<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Memory Requirements by Model Size & Quantization</text>
  
  <!-- Legend -->
  <rect x="580" y="50" width="200" height="90" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
  <rect x="590" y="65" width="20" height="15" fill="#e74c3c"/>
  <text x="620" y="77" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Full Precision (FP32)</text>
  <rect x="590" y="88" width="20" height="15" fill="#f39c12"/>
  <text x="620" y="100" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">8-bit Quantized</text>
  <rect x="590" y="111" width="20" height="15" fill="#27ae60"/>
  <text x="620" y="123" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">4-bit Quantized</text>
  
  <!-- Chart Area -->
  <line x1="100" y1="400" x2="550" y2="400" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="70" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d" transform="rotate(-90, 50, 250)">Memory (GB)</text>
  <text x="90" y="405" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">0</text>
  <text x="90" y="340" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">10</text>
  <text x="90" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">20</text>
  <text x="90" y="210" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">30</text>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">40</text>
  <text x="90" y="80" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">50</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="335" x2="550" y2="335" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="270" x2="550" y2="270" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="205" x2="550" y2="205" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="140" x2="550" y2="140" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="75" x2="550" y2="75" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- 1B Model Bars -->
  <rect x="130" y="387" width="30" height="13" fill="#27ae60"/>
  <rect x="165" y="374" width="30" height="26" fill="#f39c12"/>
  <rect x="200" y="361" width="30" height="39" fill="#e74c3c"/>
  <text x="180" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">1B</text>
  <text x="145" y="385" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~1GB</text>
  <text x="180" y="372" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~2GB</text>
  <text x="215" y="359" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~4GB</text>
  
  <!-- 3B Model Bars -->
  <rect x="260" y="374" width="30" height="26" fill="#27ae60"/>
  <rect x="295" y="348" width="30" height="52" fill="#f39c12"/>
  <rect x="330" y="322" width="30" height="78" fill="#e74c3c"/>
  <text x="310" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">3B</text>
  <text x="275" y="372" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~2GB</text>
  <text x="310" y="346" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~4GB</text>
  <text x="345" y="320" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~12GB</text>
  
  <!-- 7B Model Bars -->
  <rect x="390" y="348" width="30" height="52" fill="#27ae60"/>
  <rect x="425" y="296" width="30" height="104" fill="#f39c12"/>
  <rect x="460" y="244" width="30" height="156" fill="#e74c3c"/>
  <text x="440" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">7B</text>
  <text x="405" y="346" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~4GB</text>
  <text x="440" y="294" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~8GB</text>
  <text x="475" y="242" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~28GB</text>
  
  <!-- 13B Model Bars -->
  <rect x="520" y="322" width="30" height="78" fill="#27ae60"/>
  <rect x="555" y="244" width="30" height="156" fill="#f39c12"/>
  <rect x="590" y="166" width="30" height="234" fill="#e74c3c"/>
  <text x="570" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">13B</text>
  <text x="535" y="320" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~8GB</text>
  <text x="570" y="242" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~16GB</text>
  <text x="605" y="164" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">~52GB</text>
  
  <!-- X-axis label -->
  <text x="350" y="450" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d">Model Size (Parameters)</text>
  
  <!-- Memory type annotation -->
  <rect x="100" y="460" width="650" height="35" rx="5" fill="#d1ecf1" stroke="#0c5460" stroke-width="1"/>
  <text x="425" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0c5460">Note: Values include weights + KV cache + activations (total runtime memory). Weight-only storage ≈ half of 8-bit column.</text>
  <text x="425" y="492" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#0c5460">Rule of thumb: If model doesn't fit in available RAM/VRAM, you can't run it.</text>
</svg>