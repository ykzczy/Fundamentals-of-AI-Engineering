<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Local Inference Architecture with Ollama</text>
  
  <!-- Your App Box -->
  <rect x="30" y="150" width="120" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="90" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Your App</text>
  <text x="90" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">(Python/JS/etc.)</text>
  
  <!-- Arrow 1 -->
  <line x1="150" y1="190" x2="220" y2="190" stroke="#4A90E2" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="185" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">HTTP POST</text>
  
  <!-- Localhost Box -->
  <rect x="230" y="130" width="140" height="120" rx="10" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">localhost</text>
  <text x="300" y="185" font-family="monospace" font-size="13" text-anchor="middle" fill="white">:11434</text>
  <text x="300" y="210" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Local Server</text>
  <text x="300" y="225" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">(Same Machine)</text>
  
  <!-- Arrow 2 -->
  <line x1="370" y1="190" x2="440" y2="190" stroke="#4A90E2" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="405" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">API Call</text>
  
  <!-- Ollama Box -->
  <rect x="450" y="120" width="130" height="140" rx="10" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="515" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Ollama</text>
  <text x="515" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Model Server</text>
  <text x="515" y="200" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">• Load Model</text>
  <text x="515" y="215" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">• Run Inference</text>
  <text x="515" y="230" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">• Return Response</text>
  
  <!-- Arrow 3 -->
  <line x1="580" y1="190" x2="650" y2="190" stroke="#4A90E2" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="615" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Compute</text>
  
  <!-- Model Box -->
  <rect x="660" y="140" width="110" height="100" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="715" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Local LLM</text>
  <text x="715" y="195" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Model</text>
  <text x="715" y="215" font-family="monospace" font-size="10" text-anchor="middle" fill="white">llama3.2:1b</text>
  
  <!-- Response Arrow (curved) -->
  <path d="M 715 260 Q 715 340 90 340 Q 70 340 70 250" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#27ae60">Response (JSON/Text)</text>
  
  <!-- Key Points -->
  <rect x="30" y="280" width="180" height="100" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="120" y="300" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Key Benefits:</text>
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495e">✓ Data stays local</text>
  <text x="40" y="338" font-family="Arial, sans-serif" font-size="10" fill="#34495e">✓ No API costs</text>
  <text x="40" y="356" font-family="Arial, sans-serif" font-size="10" fill="#34495e">✓ Works offline</text>
  <text x="40" y="374" font-family="Arial, sans-serif" font-size="10" fill="#34495e">✓ Privacy preserved</text>
  
  <!-- Hardware Box -->
  <rect x="590" y="280" width="180" height="100" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="680" y="300" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#856404">Requirements:</text>
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="10" fill="#856404">• RAM/VRAM for model</text>
  <text x="600" y="338" font-family="Arial, sans-serif" font-size="10" fill="#856404">• CPU or GPU</text>
  <text x="600" y="356" font-family="Arial, sans-serif" font-size="10" fill="#856404">• Storage for weights</text>
</svg>